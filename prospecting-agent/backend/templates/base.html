<!DOCTYPE html>
<html lang="fr" class="h-full bg-gray-50">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Atlas Cyber Prospecting{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
  </style>
</head>
<body class="h-full">
  <!-- Sidebar nav -->
  <div class="flex h-full">
    <aside class="w-56 bg-gray-900 text-gray-100 flex flex-col shrink-0">
      <div class="px-6 py-5 border-b border-gray-700">
        <span class="text-lg font-bold tracking-tight">Atlas Cyber</span>
        <p class="text-xs text-gray-400 mt-0.5">Prospecting Agent</p>
      </div>
      <nav class="flex-1 px-3 py-4 space-y-1">
        <a href="/" class="flex items-center gap-2 px-3 py-2 rounded text-sm hover:bg-gray-700 {% if request.url.path == '/' %}bg-gray-700 font-semibold{% endif %}">Dashboard</a>
        <a href="/leads" class="flex items-center gap-2 px-3 py-2 rounded text-sm hover:bg-gray-700 {% if '/leads' in request.url.path %}bg-gray-700 font-semibold{% endif %}">Leads</a>
        <a href="/review" class="flex items-center gap-2 px-3 py-2 rounded text-sm hover:bg-gray-700 {% if request.url.path == '/review' %}bg-gray-700 font-semibold{% endif %}">Review Queue</a>
        <a href="/ingest" class="flex items-center gap-2 px-3 py-2 rounded text-sm hover:bg-gray-700 {% if request.url.path == '/ingest' %}bg-gray-700 font-semibold{% endif %}">Ingest</a>
      </nav>
      <div class="px-4 py-4 border-t border-gray-700">
        <a href="/api/export/leads.csv" class="block text-xs text-blue-400 hover:underline mb-1">Export leads CSV</a>
        <a href="/api/export/drafts.csv" class="block text-xs text-blue-400 hover:underline">Export drafts CSV</a>
      </div>
    </aside>

    <!-- Main content -->
    <main class="flex-1 overflow-auto">
      <div class="max-w-6xl mx-auto px-6 py-8">
        {% block content %}{% endblock %}
      </div>
    </main>
  </div>
</body>
</html>
